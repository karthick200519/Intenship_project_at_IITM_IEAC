<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Instrument Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="/styles.css?v=20260625-3" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">II</div>
          <div>
            <div class="title">Instrument Inventory</div>
            <div class="subtitle">Light, fast & animated</div>
          </div>
        </div>
        <div class="controls">
          <input id="search" placeholder="Search instruments, model, serial..." />
          <select id="userSelect"></select>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <nav>
            <button data-view="dashboard">Dashboard</button>
            <button data-view="inventory">Inventory</button>
            <button data-view="booking">Booking / Return</button>
            <button data-view="calibration">Calibration</button>
            <button data-view="learning" class="active">Learning</button>
          </nav>
          <div class="sidebar-footer">4 users · realtime · animated</div>
        </aside>

        <main id="main" class="content"></main>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js?v=20260625-3"></script>
  </body>
</html>
